name: Build and Publish JCNR Docs to GitHub Pages

# 1. THE TRIGGER: Run this script whenever code is merged into the 'main' branch
on:
  push:
    branches:
      - main

# 2. PERMISSIONS: Required to allow GitHub Actions to publish to your GitHub Pages site
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # JOB 1: Build the HTML using DITA-OT
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download and Install DITA-OT
        run: |
          curl -LO https://github.com/dita-ot/dita-ot/releases/download/4.1.2/dita-ot-4.1.2.zip
          unzip dita-ot-4.1.2.zip

      # ADDED FIX: The Prototype Hack (Absolute Paths)
      # By pointing directly to the downloaded DITA-OT DTD files on the GitHub server, 
      # we bypass all XML catalog and URN resolution issues.
      - name: Fix Custom Juniper Schemas for Prototype
        run: |
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/concept.dtd|${{ github.workspace }}/dita-ot-4.1.2/plugins/org.oasis-open.dita.v1.3/dtd/technicalContent/dtd/concept.dtd|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/task.dtd|${{ github.workspace }}/dita-ot-4.1.2/plugins/org.oasis-open.dita.v1.3/dtd/technicalContent/dtd/task.dtd|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/reference.dtd|${{ github.workspace }}/dita-ot-4.1.2/plugins/org.oasis-open.dita.v1.3/dtd/technicalContent/dtd/reference.dtd|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/topic-map/dtd/topic-map.dtd|${{ github.workspace }}/dita-ot-4.1.2/plugins/org.oasis-open.dita.v1.3/dtd/technicalContent/dtd/map.dtd|g" {} +
          
      - name: Build JCNR User Guide (HTML5)
        # Note: We are outputting directly to 'out' so index.html is at the root of your website
        run: |
          ./dita-ot-4.1.2/bin/dita --input=cloud-native-router-user.ditamap --format=html5 --output=out

      # Tell GitHub Pages to stop hiding files and serve the raw HTML
      - name: Bypass Jekyll processing
        run: touch out/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads the 'out' directory generated by DITA-OT in the previous step
          path: './out'

  # JOB 2: Deploy the built HTML to the live web URL
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4