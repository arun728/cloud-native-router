name: Build and Publish JCNR Docs to GitHub Pages

# 1. THE TRIGGER: Run this script whenever code is merged into the 'main' branch
on:
  push:
    branches:
      - main

# 2. PERMISSIONS: Required to allow GitHub Actions to publish to your GitHub Pages site
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # JOB 1: Build the HTML using DITA-OT
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download and Install DITA-OT
        run: |
          curl -LO https://github.com/dita-ot/dita-ot/releases/download/4.1.2/dita-ot-4.1.2.zip
          unzip dita-ot-4.1.2.zip

      # ADDED FIX: The Foolproof Dynamic Path Hack
      # This asks the server to physically search the downloaded DITA-OT folder 
      # for the exact location of the schemas, avoiding any path-guessing.
      - name: Fix Custom Juniper Schemas for Prototype
        run: |
          CONCEPT_DTD=$(find ${{ github.workspace }}/dita-ot-4.1.2 -type f -name concept.dtd | awk '{ print length, $0 }' | sort -n | cut -d" " -f2- | head -n 1)
          TASK_DTD=$(find ${{ github.workspace }}/dita-ot-4.1.2 -type f -name task.dtd | awk '{ print length, $0 }' | sort -n | cut -d" " -f2- | head -n 1)
          REF_DTD=$(find ${{ github.workspace }}/dita-ot-4.1.2 -type f -name reference.dtd | awk '{ print length, $0 }' | sort -n | cut -d" " -f2- | head -n 1)
          MAP_DTD=$(find ${{ github.workspace }}/dita-ot-4.1.2 -type f -name map.dtd | awk '{ print length, $0 }' | sort -n | cut -d" " -f2- | head -n 1)
          
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/concept.dtd|$CONCEPT_DTD|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/task.dtd|$TASK_DTD|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/subsection/dtd/reference.dtd|$REF_DTD|g" {} +
          find . \( -name "*.dita" -o -name "*.ditamap" \) -type f -exec sed -i "s|/SysSchema/dita13/dtd/topic-map/dtd/topic-map.dtd|$MAP_DTD|g" {} +

      # ADDED FIX: Generate a custom Juniper-style CSS file on the fly
      - name: Create Juniper Theme CSS
        run: |
          cat << 'EOF' > juniper-theme.css
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #1a1a1a; max-width: 1200px; margin: 0 auto; padding: 40px; }
          h1 { color: #212529; font-size: 2.5em; font-weight: 300; border-bottom: 4px solid #7ebc4b; padding-bottom: 10px; margin-bottom: 30px; }
          h2, h3 { color: #212529; font-weight: 400; margin-top: 1.5em; }
          a { color: #0070CD; text-decoration: none; }
          a:hover { text-decoration: underline; }
          div.navheader, div.navfooter { background-color: #f8f9fa; padding: 10px 20px; border-radius: 6px; margin: 20px 0; border: 1px solid #e9ecef; }
          pre.codeblock { background-color: #f1f3f5; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 0.9em; border-left: 3px solid #ced4da;}
          code { background-color: #f1f3f5; padding: 2px 4px; border-radius: 4px; font-family: 'JetBrains Mono', Consolas, monospace; color: #d6336c; }
          .note { border-left: 4px solid #0070CD; background-color: #f0f7fd; padding: 15px; margin: 20px 0; border-radius: 0 4px 4px 0; }
          .note__title { font-weight: bold; color: #0070CD; margin-bottom: 5px; display: block; }
          EOF
          
      - name: Build JCNR User Guide (HTML5)
        # Note: Added --args.cssroot so DITA-OT knows the exact absolute path of the generated CSS file
        run: |
          ./dita-ot-4.1.2/bin/dita --input=cloud-native-router-user.ditamap --format=html5 --output=out --args.css=juniper-theme.css --args.cssroot=${{ github.workspace }} --args.copycss=yes --args.csspath=css

      # Tell GitHub Pages to stop hiding files and serve the raw HTML
      - name: Bypass Jekyll processing
        run: touch out/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads the 'out' directory generated by DITA-OT in the previous step
          path: './out'

  # JOB 2: Deploy the built HTML to the live web URL
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4